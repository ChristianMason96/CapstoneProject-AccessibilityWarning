services:
  minio:
    image: minio/minio:latest
    container_name: capstone-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_storage:/data

volumes:
  minio_storage: